<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#1565C0"/>

  <!-- Candlestick chart: 3 candles -->

  <!-- Candle 1 (left, bearish red) -->
  <line x1="7" y1="6" x2="7" y2="10" stroke="#EF5350" stroke-width="1.5"/>
  <rect x="4.5" y="10" width="5" height="8" rx="0.5" fill="#EF5350"/>
  <line x1="7" y1="18" x2="7" y2="22" stroke="#EF5350" stroke-width="1.5"/>

  <!-- Candle 2 (center, bullish green) -->
  <line x1="16" y1="5" x2="16" y2="9" stroke="#66BB6A" stroke-width="1.5"/>
  <rect x="13.5" y="9" width="5" height="10" rx="0.5" fill="#66BB6A"/>
  <line x1="16" y1="19" x2="16" y2="24" stroke="#66BB6A" stroke-width="1.5"/>

  <!-- Candle 3 (right, bullish green) -->
  <line x1="25" y1="4" x2="25" y2="8" stroke="#66BB6A" stroke-width="1.5"/>
  <rect x="22.5" y="8" width="5" height="11" rx="0.5" fill="#66BB6A"/>
  <line x1="25" y1="19" x2="25" y2="23" stroke="#66BB6A" stroke-width="1.5"/>

  <!-- Trend line -->
  <polyline points="7,26 16,22 25,18" fill="none" stroke="#FFD54F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
